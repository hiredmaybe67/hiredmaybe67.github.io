<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(to bottom, #f7fbff, #eaf4ff);
      color: #2c3e50;
    }

    .container {
      max-width: 680px;
      margin: 80px auto;
      padding: 0 20px;
    }

    h1 {
      text-align: center;
      color: #3a7bd5;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #7aa7e9;
      margin-bottom: 40px;
      font-size: 14px;
    }

    h2 {
      color: #4a90e2;
      margin-top: 40px;
    }

    p {
      line-height: 1.7;
    }

    a {
      color: #5aa9ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    hr {
      border: none;
      height: 1px;
      background: #e0ecff;
      margin: 30px 0;
    }

  </style>
</head>

<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
