<!DOCTYPE html>
<html>
<head>
  
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">  
  <meta name="description" content="{{ page.description }}">
  <style>
    body {
      margin: 0;
    font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #f7fbff, #eaf4ff);
      color: #2c3e50;
    }
     .container {
      margin: 30px auto;
       padding: 15px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    } 
    h3 {
  font-family: "SF Pro Display", sans-serif;
      text-align: center;
      color: #FF3621;
      vertical-align: top;
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    
    h1 {
    font-family: "Domine", serif;
      text-align: center;
      color: #333333;
      font-weight: 700;
      /* margin-bottom: 20px; */
    }

    p.subtitle {
      text-align: center;
      color: #333333;
      margin-top: 0;
      /* margin-bottom: 30px; */
      font-size: 14px;
    }

    h2 {
      color: #333333;
      /* margin-top: 15px; */
    }

    a {
      color: #5aa9ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    hr {
      border: none;
      height: 1px;
      background: #e0ecff;
      /* margin: 25px 0; */
    }

    .banner {
  background: linear-gradient(to bottom, #e6f2ff, #f2f8ff);
  backdrop-filter: blur(10px);          /* Frosted glass effect */
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 12px;                  /* Rounded corners for a softer feel */
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); /* Soft, deep shadow */
  padding: 5px 5px 0px;
  text-align: center;
}
  </style>
</head>

<body>

  <div class="banner">
  <div class="banner-content">
    <h3>Hired</h3>
  </div>
</div>

  <div class="container">
    <h1>{{ page.title }}</h1>
<p>{{ page.description }}</p>
    {{ content }}
  </div>
</body>
</html>
