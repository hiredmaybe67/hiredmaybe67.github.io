<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>

  <style>
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Helvetica Neue", sans-serif;
      background: linear-gradient(to bottom, #f7fbff, #eaf4ff);
      color: #2c3e50;
    }
    .container {
      max-width: 700px;
      margin: 60px auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    h3 {
      font-family: 'Montserrat', sans-serif;      
      text-align: center;
      color: #333333;
      margin-bottom: 10px; 
      font-size: 55px;
    font-weight: 400; /* 👈 thinner */
    letter-spacing: 0.5px; /* 👈 softer look */
    }
    
    h1 {
      font: "Playfair Display";
      text-align: center;
      color: #333333;
      margin-bottom: 10px;
    }

    p.subtitle {
      text-align: center;
      color: #333333;
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 14px;
    }

    h2 {
      color: #333333;
      margin-top: 30px;
    }

    a {
      color: #5aa9ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    hr {
      border: none;
      height: 1px;
      background: #e0ecff;
      margin: 25px 0;
    }
.banner{
border-bottom: 1px solid #dbeafe;
padding-bottom: 30px;
}
  </style>
</head>

<body>

  <div class="banner">
  <div class="banner-content">
    <h3>Hired</h3>
  </div>
</div>

  <div class="container">
    {{ content }}
  </div>
</body>
</html>
